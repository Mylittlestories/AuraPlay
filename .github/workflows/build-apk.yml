name: Build AuraPlay APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build debug and release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Generate CI debug/release keystore if missing
        run: |
          if [ ! -f app/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore app/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=AuraPlay CI,O=AuraPlay,C=US"
          fi

      - name: Build debug APK
        run: ./gradlew packageDebug --no-daemon --stacktrace

      - name: Build release APK
        run: ./gradlew packageRelease --no-daemon --stacktrace

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/AuraPlay-debug.apk
          cp app/build/outputs/apk/release/app-release.apk artifacts/AuraPlay-release.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AuraPlay-APKs
          path: artifacts/*.apk

      - name: Publish GitHub release for version tags
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
