name: Build AuraPlay APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -qo /tmp/gradle.zip -d /opt/
          /opt/gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Find APK location
        run: find . -name "*.apk" -type f -exec ls -lh {} \;

      - name: Copy APK to root
        run: cp app/build/outputs/apk/debug/app-debug.apk ./AuraPlay.apk || find . -name "*.apk" -exec cp {} ./AuraPlay.apk \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AuraPlay-APK
          path: AuraPlay.apk
          if-no-files-found: error
